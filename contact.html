<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Experience the Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <nav class="desktop-nav" aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="ux.html">UX</a>
    <a href="accessibility.html">Accessibility</a>
    <a href="security.html">Security</a>
    <a href="optimization.html">Optimization</a>
    <a href="rwd.html">RWD</a>
    <a href="resources.html">Resources</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section class="page-hero">
    <div class="container">
      <h1>Contact the Hub</h1>
      <p>Ask a question, share feedback, or request more information.</p>
    </div>
  </section>

  <section class="page-image">
    <div class="container">
            <h2 class="hidden">Image</h2>
      <img src="images/contact.png" alt="Illustration representing sending a message or asking a question">
    </div>
  </section>

  <section class="content-section">
          <h2 class="hidden">Image</h2>
    <div class="container">
      <form class="contact-form">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="topic">Topic</label>
          <select id="topic" name="topic" required>
            <option value="">Choose a topic</option>
            <option value="question">Ask a Question</option>
            <option value="feedback">Share Feedback</option>
            <option value="information">Request Information</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <button type="submit" class="submit-button">Submit</button>

      </form>
    </div>
  </section>
</main>

<footer class="site-footer">
  <p>Experience the Hub</p>
  <p>&copy; 2026 Amy Bird</p>
</footer>

</body>
</html>
